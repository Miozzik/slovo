# Release build + publish.
#
# Triggered by pushing a version tag (e.g. v0.1.0). Builds the macOS .dmg
# installer with the Tauri CLI and publishes a GitHub Release with the .dmg
# attached. Can also be run manually via the Actions tab (workflow_dispatch);
# a manual run still builds the dmg but the release step needs a tag, so use a
# tag push for actual releases.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Needed so softprops/action-gh-release can create the release and upload assets.
permissions:
  contents: write

jobs:
  release:
    name: Build dmg & publish release (macOS, aarch64)
    # macos-latest is Apple Silicon (arm64) — produces an aarch64 build.
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Install binstall first, then fetch a prebuilt tauri-cli v2 binary.
      # This is much faster than `cargo install tauri-cli` (no source compile).
      # Fallback if binstall ever fails: cargo install tauri-cli --version "^2" --locked
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Tauri CLI (v2)
        run: cargo binstall -y tauri-cli@^2

      # Build ONLY the .app bundle (not Tauri's dmg). Tauri's dmg bundler styles
      # the disk-image window via AppleScript/Finder, which fails on headless CI
      # runners — so we build the app and package the dmg ourselves below. Uses
      # the committed Cargo.lock.
      - name: Build app
        working-directory: src-tauri
        run: cargo tauri build --bundles app

      # Package the .app into a .dmg with hdiutil (no AppleScript → reliable on
      # CI), including an /Applications drag-target and the app's Finder icon.
      - name: Package DMG
        run: |
          VERSION="$(python3 -c "import json;print(json.load(open('src-tauri/tauri.conf.json'))['version'])")"
          DMG="Slovo_${VERSION}_aarch64.dmg"
          bash scripts/package-dmg.sh \
            src-tauri/target/release/bundle/macos/Slovo.app \
            "$DMG" "Slovo" src-tauri/app-icon.png
          echo "DMG=$DMG" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG }}
          generate_release_notes: true
          body: |
            ## Slovo — macOS installer

            This build is **ad-hoc signed** (not Apple-notarized). On first launch
            macOS Gatekeeper will block it, so you must **right-click the app →
            Open**, then confirm. After the first launch it opens normally.

            Apple Silicon (aarch64) only.
