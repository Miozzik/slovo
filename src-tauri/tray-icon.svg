<?xml version="1.0" encoding="UTF-8"?>
<!--
  Slovo menubar TEMPLATE icon — matches the globe+chat app motif.
  Solid black silhouette on transparent bg; macOS auto-tints for light/dark.
  Simplified to read at ~22px: a globe (rim + meridian + equator) with a small
  chat-bubble notch knocked into the lower-right. Bold strokes, no color, no plate.
-->
<svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <mask id="bubbleCut">
      <rect x="0" y="0" width="44" height="44" fill="#FFFFFF"/>
      <!-- knock-out around the chat bubble so the two marks read as distinct -->
      <circle cx="31.5" cy="31.5" r="9.5" fill="#000000"/>
    </mask>
  </defs>

  <g mask="url(#bubbleCut)" stroke="#000000" stroke-width="2.6" fill="none" stroke-linecap="round">
    <!-- globe rim -->
    <circle cx="19" cy="19" r="13.5"/>
    <!-- vertical meridian -->
    <ellipse cx="19" cy="19" rx="5.6" ry="13.5"/>
    <!-- equator -->
    <line x1="5.5" y1="19" x2="32.5" y2="19"/>
    <!-- one parallel for readability -->
    <ellipse cx="19" cy="19" rx="13.5" ry="5.6"/>
  </g>

  <!-- Chat bubble (solid black silhouette, lower-right) with knocked-out dots -->
  <path fill="#000000" fill-rule="evenodd" clip-rule="evenodd"
        d="M28 25.5h9.5A2.5 2.5 0 0 1 40 28v6a2.5 2.5 0 0 1-2.5 2.5h-3.2l-2.9 2.5a1.1 1.1 0 0 1-1.8-.85V36.5H28A2.5 2.5 0 0 1 25.5 34v-6A2.5 2.5 0 0 1 28 25.5z
           M29.6 30.4a1.1 1.1 0 1 0 0 2.2 1.1 1.1 0 0 0 0-2.2z
           M32.75 30.4a1.1 1.1 0 1 0 0 2.2 1.1 1.1 0 0 0 0-2.2z
           M35.9 30.4a1.1 1.1 0 1 0 0 2.2 1.1 1.1 0 0 0 0-2.2z"/>
</svg>
