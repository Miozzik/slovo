<?xml version="1.0" encoding="UTF-8"?>
<!-- Slovo icon concept v1 — glass speech bubbles on blue->indigo mesh squircle. No letters. -->
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgv1" x1="80" y1="60" x2="440" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3AA0FF"/>
      <stop offset="0.5" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#4329C7"/>
    </linearGradient>
    <radialGradient id="meshv1a" cx="0.25" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#7CC4FF" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#7CC4FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="meshv1b" cx="0.85" cy="0.9" r="0.7">
      <stop offset="0" stop-color="#7B3FE4" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#7B3FE4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glassBack" x1="120" y1="120" x2="320" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="glassFront" x1="220" y1="200" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="edge1" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="soft1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0A1E66" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="48" y="48" width="416" height="416" rx="104" fill="url(#bgv1)"/>
  <rect x="48" y="48" width="416" height="416" rx="104" fill="url(#meshv1a)"/>
  <rect x="48" y="48" width="416" height="416" rx="104" fill="url(#meshv1b)"/>

  <!-- Back frosted bubble -->
  <g filter="url(#soft1)">
    <path d="M150 138h150a52 52 0 0 1 52 52v74a52 52 0 0 1-52 52h-70l-44 38a12 12 0 0 1-20-9v-29h-16a52 52 0 0 1-52-52V190a52 52 0 0 1 52-52z"
          fill="url(#glassBack)" stroke="#BFE0FF" stroke-opacity="0.55" stroke-width="2"/>
  </g>
  <!-- chromatic edge hint on back bubble -->
  <path d="M150 138h150a52 52 0 0 1 52 52v74a52 52 0 0 1-52 52h-70l-44 38a12 12 0 0 1-20-9v-29h-16a52 52 0 0 1-52-52V190a52 52 0 0 1 52-52z"
        fill="none" stroke="#9B7CFF" stroke-opacity="0.35" stroke-width="3"/>

  <!-- Front glass bubble (brighter) -->
  <g filter="url(#soft1)">
    <path d="M236 214h150a54 54 0 0 1 54 54v78a54 54 0 0 1-54 54h-66l50 40a12 12 0 0 1-18 11l-60-51h-56a54 54 0 0 1-54-54V268a54 54 0 0 1 54-54z"
          fill="url(#glassFront)" stroke="url(#edge1)" stroke-width="2.5"/>
  </g>
  <!-- specular highlight -->
  <ellipse cx="290" cy="252" rx="60" ry="26" fill="#FFFFFF" fill-opacity="0.55"/>
  <ellipse cx="408" cy="402" rx="14" ry="14" fill="#FFFFFF" fill-opacity="0.5"/>
</svg>
