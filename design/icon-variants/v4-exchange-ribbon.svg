<?xml version="1.0" encoding="UTF-8"?>
<!-- Slovo icon concept v4 — glossy infinity/exchange ribbon on deep squircle. Abstract motion. No letters. -->
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgv4" x1="48" y1="48" x2="464" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10204A"/>
      <stop offset="1" stop-color="#070B1E"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="120" y1="180" x2="400" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2BE6FF"/>
      <stop offset="0.5" stop-color="#3A7BFF"/>
      <stop offset="1" stop-color="#8A4BFF"/>
    </linearGradient>
    <linearGradient id="ribbon2" x1="400" y1="180" x2="120" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8A4BFF"/>
      <stop offset="0.5" stop-color="#4F5BFF"/>
      <stop offset="1" stop-color="#2BE6FF"/>
    </linearGradient>
    <linearGradient id="gloss4" x1="0" y1="160" x2="0" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.65"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowv4" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3A7BFF" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#3A7BFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft4" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#2B6BFF" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect x="48" y="48" width="416" height="416" rx="104" fill="url(#bgv4)"/>
  <rect x="48" y="48" width="416" height="416" rx="104" fill="url(#glowv4)"/>

  <!--
    Infinity / exchange loop drawn as ONE continuous figure-8 so the two
    halves visibly flow into each other (translation = continuous exchange).
    Single smooth closed path => clean interlock, even weight, glossy.
  -->
  <g filter="url(#soft4)">
    <path d="M256 256
             C 220 196 168 174 134 200
             C 96 228 96 284 134 312
             C 168 338 220 316 256 256
             C 292 196 344 174 378 200
             C 416 228 416 284 378 312
             C 344 338 292 316 256 256 Z"
          fill="none" stroke="url(#ribbon)" stroke-width="44" stroke-linejoin="round"/>
    <!-- right lobe re-tinted with the reversed gradient for depth -->
    <path d="M256 256
             C 292 196 344 174 378 200
             C 416 228 416 284 378 312
             C 344 338 292 316 256 256 Z"
          fill="none" stroke="url(#ribbon2)" stroke-width="44" stroke-linejoin="round" stroke-opacity="0.9"/>
  </g>
  <!-- crossover accent so the strands read as woven at the center -->
  <circle cx="256" cy="256" r="22" fill="url(#ribbon)" />
  <!-- top gloss highlight tracing the upper edge of the loop -->
  <path d="M150 210 C 196 184 226 206 252 244 C 280 206 312 184 358 210"
        fill="none" stroke="url(#gloss4)" stroke-width="12" stroke-linecap="round"/>
</svg>
